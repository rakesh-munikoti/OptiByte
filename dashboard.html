<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - OptiByte Enterprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .dash-card {
            background: var(--bg-card);
            border: var(--brutalist-border-thick);
            padding: 30px;
            box-shadow: var(--brutalist-shadow);
            position: relative;
        }

        .dash-card.key-card {
            background: var(--accent-yellow);
        }

        .dash-card.usage-card {
            background: var(--accent-cyan);
        }

        .dash-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .api-key-display {
            background: var(--bg-base);
            border: var(--brutalist-border);
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 700;
            word-break: break-all;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .btn-action {
            background: #000;
            color: #fff;
            border: var(--brutalist-border);
            padding: 8px 15px;
            font-family: var(--font-display);
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-tactile);
            white-space: nowrap;
        }

        .btn-action:hover {
            transform: translate(-2px, -2px);
            box-shadow: 3px 3px 0px 0px var(--border-color);
        }

        .btn-logout {
            background: var(--accent-pink);
            color: white;
            border: var(--brutalist-border);
            padding: 10px 20px;
            font-family: var(--font-display);
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-tactile);
        }

        .btn-logout:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px 0px var(--border-color);
        }

        .stat-group {
            margin-bottom: 15px;
        }

        .stat-label {
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 900;
        }

        .progress-bar-container {
            width: 100%;
            height: 24px;
            background: var(--bg-base);
            border: var(--brutalist-border);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-pink);
            width: 0%;
            transition: width 0.5s ease;
            border-right: var(--brutalist-border);
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <h2 style="font-family: var(--font-display); font-size: 32px; font-weight: 900; text-transform: uppercase;">Loading Dashboard...</h2>
    </div>

    <div class="app-container" style="display: none;" id="dashboard-content">
        <header class="app-header">
            <div class="brand">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" />
                        <path d="M12 12v9" />
                        <path d="m8 17 4 4 4-4" />
                    </svg>
                </div>
                <div class="brand-text">
                    <h1 class="title-main">OptiByte</h1>
                    <span class="tagline" id="user-email">user@domain.com</span>
                </div>
            </div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <a href="/index.html" class="btn-history-toggle" style="text-decoration: none; display: flex; align-items: center; gap: 8px;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>App</span>
                </a>
                <button class="btn-logout" id="btn-logout">Log Out</button>
            </div>
        </header>

        <main class="app-main">
            <h1 style="font-family: var(--font-display); font-size: 42px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px;">Developer Dashboard</h1>
            
            <div class="dashboard-grid">
                <!-- API Key Card -->
                <div class="dash-card key-card">
                    <h2 class="dash-title">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                        API Credentials
                    </h2>
                    <p style="font-weight: 600; margin-bottom: 15px;">Use this key to authenticate with the OptiByte API.</p>
                    
                    <div class="api-key-display">
                        <span id="api-key-val">ob_xxxxxxxxxxxxxxxxxxxx</span>
                        <button class="btn-action" id="copy-btn">Copy</button>
                    </div>

                    <a href="/pricing.html" style="text-decoration: none; display: inline-block; padding: 10px 20px; background: #fff; color: #000; border: var(--brutalist-border); font-family: var(--font-display); font-weight: 800; text-transform: uppercase; transition: var(--transition-tactile); margin-right: 10px; margin-bottom: 10px;">
                        Upgrade Plan
                    </a>
                    <a href="/api_playground.html" style="text-decoration: none; display: inline-block; padding: 10px 20px; background: var(--accent-green); color: #000; border: var(--brutalist-border); font-family: var(--font-display); font-weight: 800; text-transform: uppercase; transition: var(--transition-tactile); margin-bottom: 10px;">
                        Test API Key
                    </a>
                </div>

                <!-- Usage Stats Card -->
                <div class="dash-card usage-card">
                    <h2 class="dash-title">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        Token Usage
                    </h2>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                        <div class="stat-group">
                            <div class="stat-label">Current Plan</div>
                            <div class="stat-value" id="plan-val" style="color: var(--accent-violet);">Free</div>
                        </div>
                        <div class="stat-group" style="text-align: right;">
                            <div class="stat-label">Tokens Used Today</div>
                            <div class="stat-value" id="usage-val">0 / 5,000</div>
                        </div>
                    </div>

                    <div class="stat-label">Daily Limit Usage</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="usage-bar"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('ob_token');
        
        if (!token) {
            window.location.href = '/login.html';
        }

        async function fetchDashboard() {
            try {
                const res = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await res.json();
                
                if (data.success) {
                    const user = data.user;
                    
                    document.getElementById('user-email').textContent = user.email;
                    document.getElementById('api-key-val').textContent = user.apiKey;
                    document.getElementById('plan-val').textContent = user.plan;
                    
                    const used = user.usedToday.toLocaleString();
                    const limit = user.dailyLimit.toLocaleString();
                    document.getElementById('usage-val').textContent = `${used} / ${limit}`;
                    
                    const percent = Math.min(100, Math.max(0, (user.usedToday / user.dailyLimit) * 100));
                    document.getElementById('usage-bar').style.width = `${percent}%`;
                    
                    if (percent > 90) {
                        document.getElementById('usage-bar').style.background = 'red';
                    } else if (percent > 75) {
                        document.getElementById('usage-bar').style.background = 'orange';
                    }

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'flex';
                } else {
                    // Invalid token
                    localStorage.removeItem('ob_token');
                    window.location.href = '/login.html';
                }
            } catch (err) {
                console.error(err);
                alert('Failed to load dashboard. Please try again later.');
            }
        }

        function copyKey() {
            const keyText = document.getElementById('api-key-val').textContent;
            navigator.clipboard.writeText(keyText).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = 'Copied!';
                btn.style.background = 'var(--accent-green)';
                btn.style.color = '#000';
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.style.background = '#000';
                    btn.style.color = '#fff';
                }, 2000);
            });
        }

        function logout() {
            localStorage.removeItem('ob_token');
            window.location.href = '/login.html';
        }

        document.getElementById('btn-logout').addEventListener('click', logout);
        document.getElementById('copy-btn').addEventListener('click', copyKey);

        fetchDashboard();
    </script>
</body>
</html>
